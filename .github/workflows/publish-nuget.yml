name: Publish NuGet Package

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish (e.g. 1.0.9). Overrides the version in .csproj.'
        required: true
        type: string

jobs:
  publish:
    name: Build, Test & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Override version (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          sed -i 's|<Version>.*</Version>|<Version>${{ inputs.version }}</Version>|' CustomAutoAdapterMapper/CustomAutoAdapterMapper.csproj
          echo "Version set to ${{ inputs.version }}"

      - name: Generate package icon (SVG -> PNG)
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 256 -h 256 branding/icon.svg -o branding/icon.png

      - name: Restore dependencies
        run: dotnet restore CustomAutoAdapterMapper/CustomAutoAdapterMapper.sln

      - name: Build
        run: dotnet build CustomAutoAdapterMapper/CustomAutoAdapterMapper.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test CustomAutoAdapterMapper/CustomAutoAdapterMapper.sln --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack CustomAutoAdapterMapper/CustomAutoAdapterMapper.csproj --configuration Release --no-build --output ./nupkg

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
